name: Auto Update IPTV List

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 (北京时间 08:00)
    - cron: '0 9 * * *'  # UTC 09:00 (北京时间 17:00)
  workflow_dispatch:     # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run main.py
        run: python main.py
        env:
          # 这里设置一个通用的代理环境变量，虽然GitHub官方Runner没有HTTP_PROXY，
          # 但这样写不会报错，且如果未来你想用自己的Runner也能兼容。
          # 关键在于 main.py 里的 timeout 已经加长了。
          PYTHONUNBUFFERED: 1

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add kaniptv.m3u
          # 只有当文件有变动时才提交，避免空提交报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update m3u list $(date '+%Y-%m-%d %H:%M:%S')" && git push)
