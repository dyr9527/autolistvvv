name: Daily IPTV Auto Update

on:
  schedule:
    # 每天北京时间中午 13:00 自动触发 (UTC 5:00)
    - cron: '0 5 * * *'
  workflow_dispatch: # 允许你随时在 GitHub 网页上手动点击按钮触发运行

jobs:
  update-iptv:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装所需依赖包
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 运行抓取与加工脚本
      run: |
        python update_m3u.py

    - name: 提交并推送到 GitHub 仓库
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add hebei_iptv.m3u
        # 只有在文件有变动时才提交，防止报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新最新酒店直播源 M3U [$(date +'%Y-%m-%d %H:%M:%S')]" && git push)
