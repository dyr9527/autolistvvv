name: Update IPTV List

on:
  # 每天早上 6:00 和晚上 18:00 自动运行 (北京时间)
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京时间 06:00
    - cron: '0 10 * * *'  # UTC 10:00 = 北京时间 18:00

  # 允许手动点击按钮运行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false # 避免权限冲突

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装依赖库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # 4. 运行爬虫脚本 (带重试机制)
      # 这里使用了简单的 shell 循环来防止偶尔的网络超时导致任务直接挂掉
      - name: Run Scraper Script
        id: scraper
        run: |
          echo "🚀 开始执行抓取任务..."
          max_retries=3
          count=0
          success=false

          while [ $count -lt $max_retries ]; do
            echo "🔄 尝试第 $((count+1)) 次运行..."
            if python main.py; then
              echo "✅ 脚本运行成功！"
              success=true
              break
            else
              echo "❌ 脚本运行失败，等待 30 秒后重试..."
              count=$((count+1))
              sleep 30
            fi
          done

          if [ "$success" = false ]; then
            echo "💀 达到最大重试次数，任务终止。"
            exit 1
          fi

      # 5. 检查文件是否生成
      - name: Check output file
        run: |
          if [ ! -f "iptv.m3u" ]; then
            echo "⚠️ 警告: iptv.m3u 未生成，可能是源站无数据或筛选条件过严。"
            # 创建一个空文件或保持原样，视情况而定，这里选择不中断流程但记录日志
          else
            echo "📄 iptv.m3u 文件已生成，大小: $(wc -c < iptv.m3u) bytes"
          fi

      # 6. 提交并推送更改到仓库
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto Update: IPTV list updated on $(date '+%Y-%m-%d %H:%M:%S')"
          file_pattern: "iptv.m3u"
          branch: main # 如果你的主分支叫 master，请改为 master
