name: 每日直播源自动采集
on:
  schedule:
    # UTC 0点 = 北京时间 8点，自行修改时间
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行采集脚本
        run: python main.py

      - name: 提交更新文件
        run: |
          git config --global user.name "Actions Robot"
          git config --global user.email "robot@github.com"
          git add .
          git commit -m "自动更新直播源 $(date +'%Y-%m-%d')"
          git push
