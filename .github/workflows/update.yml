name: 更新酒店源

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 1:00 = 北京时间 9:00
    - cron: '0 5 * * *'   # UTC 5:00 = 北京时间 13:00
    - cron: '0 9 * * *'   # UTC 9:00 = 北京时间 17:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-iptv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: |
          python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f "kaniptv.m3u" ] && [ -s "kaniptv.m3u" ]; then
            git add kaniptv.m3u
            if ! git diff --cached --quiet; then
              git commit -m "📅 自动更新酒店源 $(date +'%Y-%m-%d %H:%M:%S')"
              git push
            else
              echo "📌 文件内容无变化，跳过提交"
            fi
          else
            echo "❌ 输出文件不存在或为空"
            exit 1
          fi
